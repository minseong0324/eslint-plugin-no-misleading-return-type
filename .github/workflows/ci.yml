name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint & Type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Knip
        run: pnpm knip

  test:
    name: Test (Node ${{ matrix.node-version }}, TS ${{ matrix.typescript-version }}, ESLint ${{ matrix.eslint-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']
        typescript-version: ['5.0', '5.4', '5.8', '5.9', '6.0']
        eslint-version: ['9', '10']
        exclude:
          # TS 6.0 requires Node 20+
          - node-version: '18'
            typescript-version: '6.0'
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install TypeScript ${{ matrix.typescript-version }}
        run: pnpm add -D typescript@${{ matrix.typescript-version }}

      - name: Install ESLint ${{ matrix.eslint-version }}
        run: pnpm add -D eslint@${{ matrix.eslint-version }}

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Publint
        run: pnpm publint

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || "${{ needs.test.result }}" != "success" ]]; then
            echo "lint: ${{ needs.lint.result }}"
            echo "test: ${{ needs.test.result }}"
            exit 1
          fi
